version: '3.8'

services:
  streamlit:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: image-annotation-streamlit
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ../backend/models:/app/backend/models
      - ../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
      - LOG_DIR=/app/logs
      - OSS_ACCESS_KEY_ID=
      - OSS_ACCESS_KEY_SECRET=
      - OSS_ENDPOINT=oss-cn-hangzhou.aliyuncs.com
      - OSS_BUCKET_NAME=
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.25-alpine
    container_name: image-annotation-nginx
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - streamlit
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  app-network:
    driver: bridge